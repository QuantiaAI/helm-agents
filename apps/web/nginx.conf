server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy the API (same origin → no CORS, no build-time API URL needed).
  location /api/ {
    proxy_pass http://api:5171;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # NDJSON run stream must flush live, and full runs can take minutes.
    proxy_buffering off;
    proxy_read_timeout 3600s;
  }

  # SPA history fallback: any unmatched path serves index.html so client-side
  # routes like /en/runs/:id work on refresh/deep-link.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
